name: Build & Deploy via Rsync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lexatech.my.id

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"

    - name: Build Next.js
      run: npm run build
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
        # Pastikan Anda memasukkan variabel NEXT_PUBLIC_ dari rahasia (secrets) jika ada
        # NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    - name: Prepare deploy folder
      run: |
        mkdir -p deploy-dist
        cp -r .next deploy-dist/
        cp -r public deploy-dist/
        cp package.json package-lock.json deploy-dist/
        if [ -d "prisma" ]; then cp -r prisma deploy-dist/; fi
        if [ -f "next.config.ts" ]; then cp next.config.ts deploy-dist/; fi

    - name: Deploy to VPS using rsync
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        ARGS: "-rlgoDzO --delete --size-only"
        SOURCE: "deploy-dist/"
        REMOTE_HOST: ${{ secrets.VPS_IP }}
        REMOTE_USER: ${{ secrets.VPS_USERNAME }}
        TARGET: "/opt/lexa/apps/sh01-company-profile-deploy"

    - name: Post-deploy commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/lexa/apps
          
          docker run --rm -v /opt/lexa/apps/sh01-company-profile-deploy:/app -w /app -e HOME=/tmp --user $(id -u):$(id -g) node:22-bookworm-slim npm ci --omit=dev
          rm -rf sh01-company-profile-backup
          
          if [ -d "sh01-company-profile" ]; then
            mv sh01-company-profile sh01-company-profile-backup
          fi
          mv sh01-company-profile-deploy sh01-company-profile
          
          cd /opt/lexa
          docker compose exec -T sh01-company-profile npx --yes prisma migrate deploy || true
          docker compose restart sh01-company-profile
